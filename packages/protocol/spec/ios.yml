Ios:
  type: interface

  commands:

    devices:
      internal: true
      parameters:
        serverUrl: string?
        capabilities: json?
        udids:
          type: array?
          items: string
      returns:
        devices:
          type: array
          items: IosDevice

IosDevice:
  type: interface

  initializer:
    udid: string
    name: string
    osVersion: string
    platform: string
    isSimulator: boolean

  commands:

    tap:
      title: Tap
      parameters:
        iosSelector: IosSelector
        timeout: float

    fill:
      title: Fill "{text}"
      parameters:
        iosSelector: IosSelector
        text: string
        timeout: float

    screenshot:
      title: Screenshot
      returns:
        binary: binary

    webViews:
      internal: true
      returns:
        webViews:
          type: array
          items: IosWebView

    executeScript:
      internal: true
      parameters:
        script: string
        args: json?
      returns:
        result: json?

    close:
      title: Close

  events:
    webViewAdded:
      parameters:
        webView: IosWebView

    webViewRemoved:
      parameters:
        bundleId: string

    close:

IosWebView:
  type: object
  properties:
    bundleId: string
    title: string?
    url: string?
    contextName: string

IosSelector:
  type: object
  properties:
    accessibilityId: string?
    iosPredicate: string?
    iosClassChain: string?
    xpath: string?
    className: string?
